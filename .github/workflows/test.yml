name: Build and Test

on:
  merge_group:
  workflow_dispatch:
  pull_request:
    branches: [main, early-access]
  push:
    branches: [main, early-access]

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  CACHE_KEY: "${{ github.ref }}-${{ github.run_id }}-${{ github.run_attempt }}"

jobs:
  test:
    strategy:
      matrix:
        node: [ 20, 22 ]
    name: Build Package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js with pnpm caching
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build auth0-fastify
        run: pnpm run build --filter @auth0/auth0-fastify

      - name: Build auth0-fastify-api
        run: pnpm run build --filter @auth0/auth0-fastify-api

      - name: Test auth0-fastify
        run: pnpm run test:ci --filter @auth0/auth0-fastify

      - name: Test auth0-fastify-api
        run: pnpm run test:ci --filter @auth0/auth0-fastify-api

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js with pnpm caching
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Lint @auth0/auth0-fastify
        run: pnpm run lint --filter @auth0/auth0-fastify

      - name: Lint @auth0/auth0-fastify-api
        run: pnpm run lint --filter @auth0/auth0-fastify-api
